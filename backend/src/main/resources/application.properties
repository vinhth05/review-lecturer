spring.application.name=ctu-review-platform
server.port=8080

# ==================== DATABASE ====================
spring.datasource.url=${DB_URL:jdbc:sqlserver://localhost:1433;databaseName=ctu_review;encrypt=true;trustServerCertificate=true}
spring.datasource.username=sa
spring.datasource.password=123456
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver

# ==================== JPA ====================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.SQLServerDialect
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
spring.jpa.show-sql=false

# ==================== REDIS ====================
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.password=${REDIS_PASSWORD:}
spring.data.redis.timeout=${REDIS_TIMEOUT:2000ms}
spring.data.redis.database=${REDIS_DATABASE:0}
spring.data.redis.lettuce.pool.max-active=${REDIS_MAX_ACTIVE:20}
spring.data.redis.lettuce.pool.max-idle=${REDIS_MAX_IDLE:10}
spring.data.redis.lettuce.pool.min-idle=${REDIS_MIN_IDLE:5}
spring.data.redis.lettuce.pool.max-wait=${REDIS_MAX_WAIT:PT1M}

# ==================== MAIL ====================
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:tranvinhhien2222@gmail.com}
spring.mail.password=${MAIL_PASSWORD:gjqm fbgs umzr akeq}
spring.mail.properties.mail.smtp.auth=${MAIL_SMTP_AUTH:true}
spring.mail.properties.mail.smtp.starttls.enable=${MAIL_SMTP_STARTTLS:true}
spring.mail.properties.mail.smtp.connectiontimeout=${MAIL_SMTP_CONNECTION_TIMEOUT:5000}
spring.mail.properties.mail.smtp.timeout=${MAIL_SMTP_TIMEOUT:5000}
spring.mail.properties.mail.smtp.writetimeout=${MAIL_SMTP_WRITE_TIMEOUT:5000}

# ==================== KAFKA ====================
spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
spring.kafka.admin.auto-create=${KAFKA_AUTO_CREATE:true}
spring.kafka.consumer.group-id=${KAFKA_CONSUMER_GROUP:otp-email-group}
spring.kafka.consumer.auto-offset-reset=latest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.trusted.packages=com.example.ctu.otp.dto
spring.kafka.consumer.properties.spring.json.value.default.type=com.example.ctu.otp.dto.OtpEmailMessage
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer

app.kafka.topic.otp-email=${KAFKA_TOPIC_OTP_EMAIL:otp-email-topic}

# ==================== MVC & WEB ====================
spring.mvc.view.prefix=/templates/
spring.mvc.view.suffix=.html
spring.web.resources.add-mappings=true

# ==================== ERROR HANDLING ====================
server.error.include-message=always
server.error.include-binding-errors=always
server.error.include-stacktrace=never

# ==================== JWT ====================
app.jwt.secret=${JWT_SECRET:change-me-change-me-change-me-change-me}
app.jwt.expiration-minutes=${JWT_EXPIRATION_MINUTES:1440}
app.jwt.refresh-token-expiration-days=${JWT_REFRESH_TOKEN_EXPIRATION_DAYS:7}

# ==================== OTP ====================
app.otp.ttl-minutes=${OTP_TTL_MINUTES:5}
app.otp.app-name=${OTP_APP_NAME:CTU Review Platform}
app.otp.mail-subject=${OTP_MAIL_SUBJECT:Your OTP Code}

# ==================== REVIEW ====================
app.review.rate-limit-per-day=${REVIEW_RATE_LIMIT_PER_DAY:5}
app.review.secret-key=${REVIEW_SECRET_KEY:change-me-secret-key}
app.review.toxic-keywords=${TOXIC_KEYWORDS:spam,scam,idiot,stupid,dumb,trash,xxx,ngu,đần,ngu dốt}

# ==================== CORS ====================
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173,http://localhost:5174}

