spring.application.name=ctu-review-platform
server.port=8080

spring.datasource.url=${DB_URL:jdbc:sqlserver://localhost:1433;databaseName=ctu_review;encrypt=true;trustServerCertificate=true}
spring.datasource.username=sa
spring.datasource.password=123456
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.SQLServerDialect
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
spring.jpa.show-sql=false

spring.mail.host=${MAIL_HOST:localhost}
spring.mail.port=${MAIL_PORT:1025}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=${MAIL_SMTP_AUTH:false}
spring.mail.properties.mail.smtp.starttls.enable=${MAIL_SMTP_STARTTLS:false}

app.jwt.secret=${JWT_SECRET:change-me-change-me-change-me-change-me}
app.jwt.expiration-minutes=${JWT_EXPIRATION_MINUTES:1440}
app.otp.ttl-minutes=${OTP_TTL_MINUTES:10}
app.review.rate-limit-per-day=${REVIEW_RATE_LIMIT_PER_DAY:5}
app.review.secret-key=${REVIEW_SECRET_KEY:change-me-secret-key}
app.review.toxic-keywords=${TOXIC_KEYWORDS:spam,scam,idiot,stupid,dumb,trash,xxx,ngu,đần,ngu dốt}
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:5174}

