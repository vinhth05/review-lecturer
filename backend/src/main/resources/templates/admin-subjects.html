<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Subjects</title>
  <link rel="stylesheet" href="/css/site.css">
</head>
<body>
<main class="page-shell">
  <header class="topbar">
    <div class="topbar-content">
      <div class="brand">
        <div class="brand-title">Admin Subjects</div>
        <div class="brand-sub">Quản lý môn học</div>
      </div>
      <nav class="nav">
        <a href="/admin-panel">Dashboard</a>
        <a href="/admin-panel/faculties">Faculties</a>
        <a href="/admin-panel/subjects">Subjects</a>
        <a href="/admin-panel/lecturers">Lecturers</a>
        <a href="/admin-panel/reports">Reports</a>
        <a href="/admin-panel/reviews">Reviews</a>
        <a href="/admin-panel/users">Users</a>
        <a href="/admin-panel/keywords">Keywords</a>
        <a class="nav-primary" href="/logout">Đăng xuất</a>
      </nav>
    </div>
  </header>

  <section class="main-content admin-page">
    <section class="hero">
      <div class="eyebrow">Subject CRUD</div>
      <h1>Quản lý môn học</h1>
      <p>Tạo, sửa, xóa môn học và gắn vào khoa tương ứng.</p>
    </section>

    <section class="section">
      <form class="form" id="subjectForm" th:if="${isSuperAdmin}">
        <div class="field"><label>Tên môn</label><input type="text" id="subjectName" required></div>
        <div class="field"><label>Mã môn</label><input type="text" id="subjectCode" required></div>
        <div class="field"><label>Khoa</label><select id="subjectFacultyId" required></select></div>
        <button class="button primary" type="submit">Thêm môn</button>
      </form>
    </section>

    <section class="section">
      <div class="table-wrap">
        <table class="admin-table" id="subjectsTable">
          <thead>
          <tr>
            <th>ID</th><th>Tên môn</th><th>Mã môn</th><th>Khoa</th><th>Ngày tạo</th><th>Thao tác</th>
          </tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>
    </section>
  </section>
</main>

<script th:inline="javascript">
const isSuperAdmin = /*[[${isSuperAdmin}]]*/ false;
let faculties = [];

async function loadFaculties() {
  const res = await fetch('/admin/faculties?page=0&size=200');
  const data = await res.json();
  faculties = data.content || [];
  const select = document.getElementById('subjectFacultyId');
  if (select) {
    select.innerHTML = faculties.map(f => `<option value="${f.id}">${f.name} (${f.code})</option>`).join('');
  }
}

async function loadSubjects() {
  const res = await fetch('/admin/subjects?page=0&size=200');
  if (!res.ok) { alert('Không tải được danh sách môn'); return; }
  const data = await res.json();
  const body = document.querySelector('#subjectsTable tbody');
  body.innerHTML = (data.content || []).map(item => `
    <tr>
      <td>${item.id}</td>
      <td>${item.name}</td>
      <td>${item.code}</td>
      <td>${item.facultyName}</td>
      <td>${item.createdAt || ''}</td>
      <td>
        <button class="button secondary" onclick="editSubject(${item.id}, '${escapeJs(item.name)}', '${escapeJs(item.code)}', ${item.facultyId})" ${isSuperAdmin ? '' : 'disabled'}>Sửa</button>
        <button class="button secondary" onclick="deleteSubject(${item.id})" ${isSuperAdmin ? '' : 'disabled'}>Xóa</button>
      </td>
    </tr>
  `).join('');
}

function escapeJs(value) {
  return String(value ?? '').replace(/\\/g, '\\\\').replace(/'/g, "\\'").replace(/\n/g, ' ');
}

document.getElementById('subjectForm')?.addEventListener('submit', async (event) => {
  event.preventDefault();
  const name = document.getElementById('subjectName').value.trim();
  const code = document.getElementById('subjectCode').value.trim();
  const facultyId = Number(document.getElementById('subjectFacultyId').value);
  const res = await fetch('/admin/subjects', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ name, code, facultyId })
  });
  if (!res.ok) { alert('Thêm môn thất bại'); return; }
  event.target.reset();
  loadSubjects();
});

async function editSubject(id, currentName, currentCode, currentFacultyId) {
  if (!isSuperAdmin) return;
  const name = prompt('Tên môn mới:', currentName);
  if (name === null) return;
  const code = prompt('Mã môn mới:', currentCode);
  if (code === null) return;
  const facultyId = prompt('ID khoa mới:', String(currentFacultyId));
  if (facultyId === null) return;
  const res = await fetch(`/admin/subjects/${id}`, {
    method: 'PATCH',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ name: name.trim(), code: code.trim(), facultyId: Number(facultyId) })
  });
  if (!res.ok) { alert('Sửa môn thất bại'); return; }
  loadSubjects();
}

async function deleteSubject(id) {
  if (!isSuperAdmin) return;
  if (!confirm('Xóa môn #' + id + '?')) return;
  const res = await fetch(`/admin/subjects/${id}`, { method: 'DELETE' });
  if (res.status !== 204) { alert('Xóa môn thất bại'); return; }
  loadSubjects();
}

Promise.all([loadFaculties(), loadSubjects()]);
</script>
</body>
</html>
