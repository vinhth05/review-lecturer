<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Danh sách giảng viên</title>
  <link rel="stylesheet" href="/css/site.css">
</head>
<body>
<main class="page-shell">
  <header class="topbar">
    <div class="brand">
      <strong>Danh sách giảng viên</strong>
      <span>Filter theo khoa/môn nếu cần</span>
    </div>
    <nav class="nav">
      <a href="/">Trang chủ</a>
      <a href="/login">Đăng nhập</a>
      <a href="/register">Đăng ký</a>
    </nav>
  </header>

  <section class="hero">
    <h1>Giảng viên</h1>
    <p>Trang này render trực tiếp từ controller, không qua React/Vite.</p>
  </section>

  <div class="list">
    <article class="lecturer-item" th:each="lecturer : ${lecturers}">
      <div>
        <strong th:text="${lecturer.fullName}">Tên giảng viên</strong>
        <div class="meta">
          <span th:text="${lecturer.facultyName}">Khoa</span>
          ·
          <span th:text="${lecturer.subjectName != null ? lecturer.subjectName : 'Chưa có môn'}">Môn</span>
        </div>
      </div>
      <div style="text-align:right">
        <div class="rating" th:text="|${#numbers.formatDecimal(lecturer.averageRating, 1, 2)}/5|">4.20/5</div>
        <div class="meta" th:text="${lecturer.reviewCount} + ' review'">0 review</div>
        <a class="button-secondary" th:href="@{'/lecturers/' + ${lecturer.id}}">Xem chi tiết</a>
      </div>
    </article>
  </div>
</main>
</body>
</html>
