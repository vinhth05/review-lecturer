services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: ctu-sqlserver
    environment:
      ACCEPT_EULA: "Y"
      SA_PASSWORD: "YourStrong!Passw0rd"
    ports:
      - "1433:1433"
    healthcheck:
      test: ["CMD", "/opt/mssql-tools18/bin/sqlcmd", "-S", "localhost", "-U", "sa", "-P", "YourStrong!Passw0rd", "-C", "-Q", "SELECT 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  mailhog:
    image: mailhog/mailhog:v1.0.1
    container_name: ctu-mailhog
    ports:
      - "1025:1025"
      - "8025:8025"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ctu-backend
    environment:
      DB_URL: jdbc:sqlserver://sqlserver:1433;databaseName=ctu_review;encrypt=true;trustServerCertificate=true
      DB_USERNAME: sa
      DB_PASSWORD: YourStrong!Passw0rd
      JWT_SECRET: change-me-change-me-change-me-change-me
      REVIEW_SECRET_KEY: ctu-review-secret
      CORS_ALLOWED_ORIGINS: http://localhost:5173,http://localhost:3000,http://localhost
      MAIL_HOST: mailhog
      MAIL_PORT: 1025
      MAIL_SMTP_AUTH: "false"
      MAIL_SMTP_STARTTLS: "false"
    depends_on:
      sqlserver:
        condition: service_healthy
      mailhog:
        condition: service_started
    ports:
      - "8080:8080"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ctu-frontend
    depends_on:
      - backend
    ports:
      - "5173:80"
